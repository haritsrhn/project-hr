services:

  # ─── Backend: Laravel (PHP-FPM) ───────────────────────────────────────────
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: tridaya_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
    depends_on:
      - db
      - redis
    networks:
      - tridaya_net

  # ─── Web Server: Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: tridaya_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tridaya_net

  # ─── Database: PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: tridaya_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-tridaya_hris}
      POSTGRES_USER: ${DB_USERNAME:-tridaya}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - tridaya_db_data:/var/lib/postgresql/data
    networks:
      - tridaya_net

  # ─── Cache & Queue: Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tridaya_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - tridaya_redis_data:/data
    networks:
      - tridaya_net

  # ─── Queue Worker: Laravel Horizon ───────────────────────────────────────
  horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: tridaya_horizon
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - app
      - redis
    networks:
      - tridaya_net

  # ─── Task Scheduler: Laravel Schedule ────────────────────────────────────
  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: tridaya_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - app
    networks:
      - tridaya_net

  # ─── Frontend: Next.js ───────────────────────────────────────────────────
  frontend:
    image: node:22-alpine
    container_name: tridaya_frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    networks:
      - tridaya_net

volumes:
  tridaya_db_data:
  tridaya_redis_data:

networks:
  tridaya_net:
    driver: bridge
